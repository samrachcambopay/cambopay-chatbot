<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://cambopay.com.kh/wp-content/uploads/2025/07/cropped-300384709_394715669453516_6674413696231740539_n-32x32.png">
<title>CamboPay API Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --light-blue: #e8f4fd;
    --blue-100: #d0eaf9;
    --blue-200: #a1d5f3;
    --blue-400: #3aa0e4;
    --blue-500: #1a87d4;
    --blue-600: #1267a8;
    --blue-700: #0d4f82;
    --blue-dark: #0a3d64;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --shadow-sm: 0 1px 3px rgba(26,135,212,0.08);
    --shadow-md: 0 4px 20px rgba(26,135,212,0.12);
    --shadow-lg: 0 10px 40px rgba(26,135,212,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #f0f8ff 0%, #e8f4fd 40%, #f5fbff 100%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Decorative background blobs */
  body::before {
    content: '';
    position: fixed; top: -80px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(58,160,228,0.15), transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -60px; left: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(26,135,212,0.1), transparent 70%);
    border-radius: 50%; pointer-events: none;
  }

  .app-wrapper {
    width: 100%; max-width: 820px;
    display: flex; flex-direction: column; gap: 0;
    height: 100dvh;
    max-height: 860px;
  }

  /* Header */
  .header {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--blue-100);
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
    overflow: hidden;
  }

  .logo-badge {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(26,135,212,0.3);
  }

  .header-text h1 {
    font-size: 17px; font-weight: 700; color: var(--gray-800);
    line-height: 1.2;
  }
  .header-text p {
    font-size: 12px; color: var(--gray-400); font-weight: 400;
    margin-top: 2px;
  }

  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: #22c55e; font-weight: 500;
  }
  .status-dot::before {
    content: '';
    width: 8px; height: 8px;
    background: #22c55e; border-radius: 50%;
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform: scale(1); }
    50% { opacity:0.6; transform: scale(1.3); }
  }

  /* Chat area */
  .chat-area {
    background: var(--white);
    flex: 1; overflow-y: auto; padding: 16px 16px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth;
    overflow-x: hidden;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 10px; }

  /* Messages */
  .message {
    display: flex; gap: 12px; max-width: 88%;
    min-width: 0;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end; flex-direction: row-reverse;
  }

  .avatar {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.bot {
    background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
    box-shadow: 0 3px 10px rgba(26,135,212,0.25);
  }
  .avatar.user {
    background: var(--gray-100);
    font-size: 13px; color: var(--gray-600);
  }

  .bubble {
    padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.65; color: var(--gray-800);
    min-width: 0; overflow-wrap: break-word; word-break: break-word;
    flex: 1;
  }
  .message.bot .bubble {
    background: var(--light-blue);
    border: 1px solid var(--blue-100);
    border-top-left-radius: 4px;
  }
  .message.user .bubble {
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    color: var(--white); border-top-right-radius: 4px;
  }

  /* Markdown-style content in bubbles */
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(26,135,212,0.12); color: var(--blue-700);
    padding: 2px 6px; border-radius: 5px; font-size: 12.5px;
  }
  .message.user .bubble code {
    background: rgba(255,255,255,0.2); color: var(--white);
  }
  .bubble pre {
    background: var(--gray-800); color: #e2e8f0;
    border-radius: 10px; padding: 14px; margin: 10px 0;
    overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.08);
    max-width: 100%; white-space: pre-wrap; word-break: break-all;
  }
  .bubble pre code { background: none; color: inherit; padding: 0; font-size: 12px; }
  .bubble strong { font-weight: 600; color: var(--blue-700); }
  .message.user .bubble strong { color: var(--white); }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble .table-wrap {
    width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;
    margin: 10px 0; border-radius: 8px;
  }
  .bubble table {
    border-collapse: collapse; min-width: 100%; margin: 0;
    font-size: 12.5px;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--blue-200); padding: 7px 10px; text-align: left;
  }
  .bubble th { background: var(--blue-100); font-weight: 600; color: var(--blue-700); }
  .bubble tr:nth-child(even) td { background: var(--gray-50); }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12.5px; }
  .bubble h3 { font-size: 14px; font-weight: 700; color: var(--blue-700); margin: 10px 0 5px; }

  /* Quick suggestions */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 0;
  }
  .suggestion-btn {
    background: var(--white); border: 1.5px solid var(--blue-200);
    color: var(--blue-600); padding: 7px 13px; border-radius: 20px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all 0.2s; white-space: nowrap;
  }
  .suggestion-btn:hover {
    background: var(--blue-500); border-color: var(--blue-500);
    color: var(--white); transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(26,135,212,0.25);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 5px; align-items: center; padding: 14px 16px;
    background: var(--light-blue); border: 1px solid var(--blue-100);
    border-radius: 16px; border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--blue-400);
    animation: typeBounce 1.2s ease infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typeBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: var(--white);
    border-radius: 0 0 20px 20px;
    border-top: 1px solid var(--blue-100);
    padding: 16px 20px;
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }

  textarea {
    flex: 1; resize: none; border: 1.5px solid var(--blue-200);
    border-radius: 14px; padding: 12px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; color: var(--gray-800);
    background: var(--gray-50); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 46px; max-height: 120px; line-height: 1.5;
  }
  textarea:focus {
    border-color: var(--blue-400);
    box-shadow: 0 0 0 3px rgba(58,160,228,0.12);
    background: var(--white);
  }
  textarea::placeholder { color: var(--gray-400); }

  .send-btn {
    width: 46px; height: 46px; border-radius: 13px; border: none;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    color: var(--white); cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(26,135,212,0.3);
  }
  .send-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(26,135,212,0.4);
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  .input-hint {
    font-size: 11px; color: var(--gray-400); margin-top: 8px;
    text-align: center;
  }

  /* Welcome card */
  .welcome-card {
    background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-700) 100%);
    border-radius: 16px; padding: 22px 24px; color: var(--white);
    margin-bottom: 4px;
  }
  .welcome-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .welcome-card p { font-size: 13px; opacity: 0.88; line-height: 1.6; }
  .welcome-topics {
    display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px;
  }
  .topic-tag {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 11px; border-radius: 20px; font-size: 11.5px; font-weight: 500;
  }

  /* ===== RESPONSIVE / MOBILE ===== */
  @media (max-width: 600px) {
    body { padding: 0; background: var(--white); }
    body::before, body::after { display: none; }

    .app-wrapper {
      height: 100dvh; max-height: none;
      border-radius: 0;
    }
    .header { border-radius: 0; padding: 12px 14px; }
    .chat-area { padding: 12px 12px; }
    .input-area { padding: 10px 12px; border-radius: 0; }

    .message { max-width: 96%; }
    .bubble { font-size: 13px; padding: 10px 13px; }
    .bubble pre { font-size: 11px; }
    .bubble th, .bubble td { padding: 6px 8px; font-size: 11.5px; }

    .suggestions { gap: 6px; }
    .suggestion-btn { font-size: 11px; padding: 6px 10px; }

    .welcome-card h2 { font-size: 15px; }
    .welcome-card p { font-size: 12px; }

    .header-text h1 { font-size: 14px; }
    .header-text p { font-size: 11px; }
  }

  @media (max-width: 400px) {
    .message { max-width: 100%; }
    .avatar { width: 28px; height: 28px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app-wrapper">
  <!-- Header -->
  <div class="header">
    <img src="https://cambopay.com.kh/wp-content/uploads/2025/03/logo-cambopay-convert-1024x281.png"
         alt="CamboPay" style="height:38px; width:auto; object-fit:contain; flex-shrink:0;">
    <div style="width:1px; height:34px; background:var(--blue-100); flex-shrink:0;"></div>
    <div class="header-text">
      <h1>CamboPay API Assistant</h1>
      <p>TOPUP Service</p>
    </div>
    <div class="status-dot">Online</div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <!-- Welcome message injected by JS -->
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Ask about CamboPay API, parameters, responses, errors…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>

// ===================== STATE =====================
let messages = [];
let isLoading = false;

// ===================== INIT =====================
window.onload = () => {
  renderWelcome();
};

function renderWelcome() {
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = `
    <div class="message bot" style="max-width:100%">
      <div class="avatar bot">🤖</div>
      <div>
        <div class="welcome-card">
          <h2>Welcome to CamboPay API Assistant</h2>
          <p>I can support you following to process on board with CamboPay service.</p>
          <div class="welcome-topics">
            <span class="topic-tag">Pinless Topup</span>
            <span class="topic-tag">Pincode Topup</span>
            <span class="topic-tag">Transaction Query</span>
            <span class="topic-tag">Balance Query</span>
            <span class="topic-tag">Response Codes</span>
            <span class="topic-tag">RSA Signature</span>
            <span class="topic-tag">SOAP XML Samples</span>
          </div>
        </div>
        <div class="suggestions" style="margin-top:10px">
          <button class="suggestion-btn" onclick="quickAsk('How do I make a Pinless topup request?')">📱 Pinless Topup</button>
          <button class="suggestion-btn" onclick="quickAsk('Show me the SOAP XML for GetCard (Pincode topup)')">🎴 Pincode Topup</button>
          <button class="suggestion-btn" onclick="quickAsk('How do I generate the RSA signature?')">🔐 RSA Signature</button>
          <button class="suggestion-btn" onclick="quickAsk('What are all the response codes and their meanings?')">📋 Response Codes</button>
          <button class="suggestion-btn" onclick="quickAsk('How do I query transaction status?')">🔍 Query Status</button>
          <button class="suggestion-btn" onclick="quickAsk('What are the production API endpoints?')">🌐 API Endpoints</button>
        </div>
      </div>
    </div>
  `;
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ===================== SEND =====================
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  autoResize(input);

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });

  setLoading(true);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages
      })
    });

    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I could not get a response.';

    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('bot', reply);
  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ Connection error. Please check your network and try again.');
  }

  setLoading(false);
}

// ===================== UI HELPERS =====================
function appendMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarIcon = role === 'bot' ? '🤖' : '👤';
  div.innerHTML = `
    <div class="avatar ${role}">${avatarIcon}</div>
    <div class="bubble">${role === 'bot' ? formatMarkdown(text) : escapeHtml(text)}</div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setLoading(state) {
  isLoading = state;
  document.getElementById('sendBtn').disabled = state;
  if (state) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'message bot'; div.id = 'typingMsg';
    div.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function formatMarkdown(text) {
  // Step 1: escape HTML
  let out = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Step 2: fenced code blocks
  out = out.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
    '<pre><code>' + code.trim() + '</code></pre>');

  // Step 3: inline code
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Step 4: bold
  out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Step 5: headings
  out = out.replace(/^#{1,3} (.+)$/gm, '<h3>$1</h3>');

  // Step 6: tables — parse line by line
  const lines = out.split('\n');
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // Detect table row: starts and ends with |
    if (/^\|.*\|$/.test(line.trim())) {
      const tableLines = [];
      while (i < lines.length && /^\|.*\|$/.test(lines[i].trim())) {
        tableLines.push(lines[i]);
        i++;
      }
      // Build table: first row = header, skip separator rows (contain ---)
      let tableHtml = '<table>';
      let isHeader = true;
      for (const tl of tableLines) {
        const cells = tl.split('|').slice(1, -1).map(c => c.trim());
        // Skip separator rows
        if (cells.every(c => /^[-: ]+$/.test(c))) continue;
        if (isHeader) {
          tableHtml += '<tr>' + cells.map(c => '<th>' + c + '</th>').join('') + '</tr>';
          isHeader = false;
        } else {
          tableHtml += '<tr>' + cells.map(c => '<td>' + c + '</td>') .join('') + '</tr>';
        }
      }
      tableHtml += '</table>';
      result.push('<div class="table-wrap">' + tableHtml + '</div>');
    } else {
      result.push(line);
      i++;
    }
  }
  out = result.join('\n');

  // Step 7: lists
  out = out.replace(/^- (.+)$/gm, '<li>$1</li>');
  out = out.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');

  // Step 8: line breaks (skip inside pre/table)
  out = out.replace(/\n(?!<\/(pre|table|ul|tr|th|td))/g, '<br>');

  return out;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
